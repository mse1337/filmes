<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberFlix</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="logo">mse1337<span>.dev</span></div>
  <a href="favoritos.html" class="btn-voltar">❤️ FAVORITOS</a>
</header>

<h1>Cyber<span>Flix</span></h1>

<div class="busca">
  <input type="text" id="busca" placeholder="Digite o nome do filme...">
  <button id="btn-buscar">Buscar</button>
</div>
<div id="generos">
  <button class="btn-genero ativo" data-id="">Todos</button>
  <button class="btn-genero" data-id="28">Ação</button>
  <button class="btn-genero" data-id="35">Comédia</button>
  <button class="btn-genero" data-id="27">Terror</button>
  <button class="btn-genero" data-id="18">Drama</button>
  <button class="btn-genero" data-id="878">Ficção Científica</button>
  <button class="btn-genero" data-id="10749">Romance</button>
  <button class="btn-genero" data-id="16">Animação</button>
</div>

<div id="loading" class="loading-fechado">Buscando filmes... 🎬</div>

<div id="resultados"></div>

<div id="paginacao">
  <button id="btn-anterior">← Anterior</button>
  <span id="pagina-atual">Página 1</span>
  <button id="btn-proximo">Próximo →</button>
</div>

<div id="modal" class="modal-fechado">
  <div id="modal-conteudo">
    <button id="fechar-modal">✕</button>
    <div id="modal-info"></div>
  </div>
</div>

<script>        
  const btn = document.querySelector('#btn-buscar');
  const input = document.querySelector('#busca');
  const resultados = document.querySelector('#resultados');
  const loading = document.querySelector('#loading');
  const modal = document.querySelector('#modal');
  const modalInfo = document.querySelector('#modal-info');
  const fecharModal = document.querySelector('#fechar-modal');

  const API_KEY = '839dddd60706058e2981d8594524ef04';
  let paginaAtual = 1;
  let buscaAtual = '';
  let generoAtual = '';

  function buscarFilmes() {
    loading.classList.remove('loading-fechado');
    resultados.innerHTML = '';

    const url = buscaAtual 
      ? `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${buscaAtual}&language=pt-BR&page=${paginaAtual}`
      : generoAtual
        ? `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=pt-BR&page=${paginaAtual}&with_genres=${generoAtual}`
        : `https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=pt-BR&page=${paginaAtual}`;

    fetch(url)
      .then(function(resposta) { return resposta.json(); })
      .then(function(dados) {
        loading.classList.add('loading-fechado');
        document.querySelector('#pagina-atual').textContent = `Página ${paginaAtual}`;

        dados.results.forEach(function(filme) {
          const capa = filme.poster_path 
            ? `https://image.tmdb.org/t/p/w200${filme.poster_path}` 
            : 'https://placehold.co/200x300?text=Sem+Capa';
          const ano = filme.release_date ? filme.release_date.slice(0, 4) : 'Sem data';
          const nota = filme.vote_average ? filme.vote_average.toFixed(1) : 'N/A';

          const favoritado = favoritos.some(f => f.id === filme.id);

resultados.innerHTML += `
  <div onclick="abrirModal(${filme.id})" style="cursor:pointer">
    <img src="${capa}" alt="${filme.title}">
    <h2>${filme.title}</h2>
    <p class="info">⭐ ${nota} · 📅 ${ano}</p>
    <p>${filme.overview}</p>
    <button class="btn-favorito ${favoritado ? 'favoritado' : ''}" onclick="favoritar(event, ${filme.id}, '${filme.title}', '${capa}')">
      ${favoritado ? '❤️ Favoritado' : '🤍 Favoritar'}
    </button>
  </div>
`;
        });
      });
  }

  btn.addEventListener('click', function() {
    buscaAtual = input.value;
    paginaAtual = 1;
    buscarFilmes();
  });

  input.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') { btn.click(); }
  });

  document.querySelector('#btn-proximo').addEventListener('click', function() {
    paginaAtual++;
    buscarFilmes();
  });

  document.querySelector('#btn-anterior').addEventListener('click', function() {
    if (paginaAtual > 1) { paginaAtual--; buscarFilmes(); }
  });

function abrirModal(id) {
  fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=pt-BR`)
    .then(function(resposta) { return resposta.json(); })
    .then(function(filme) {
      const capa = filme.poster_path 
        ? `https://image.tmdb.org/t/p/w300${filme.poster_path}` 
        : 'https://placehold.co/150x225?text=Sem+Capa';
      const duracao = filme.runtime ? `${filme.runtime} min` : 'N/A';
      const nota = filme.vote_average ? filme.vote_average.toFixed(1) : 'N/A';
      const ano = filme.release_date ? filme.release_date.slice(0, 4) : 'N/A';
      const generos = filme.genres.map(g => g.name).join(', ');

      modalInfo.innerHTML = `
        <img src="${capa}" alt="${filme.title}">
        <h2>${filme.title}</h2>
        <p>⭐ ${nota} · 📅 ${ano} · ⏱ ${duracao}</p>
        <p>🎭 ${generos}</p>
        <p style="clear:both; margin-top: 1rem">${filme.overview}</p>
        <div id="trailer"></div>
      `;

      modal.classList.remove('modal-fechado');

      fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}&language=pt-BR`)
        .then(function(r) { return r.json(); })
        .then(function(dados) {
          const trailer = dados.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
          if (trailer) {
            document.querySelector('#trailer').innerHTML = `
              <iframe 
                width="100%" 
                height="250" 
                src="https://www.youtube.com/embed/${trailer.key}" 
                frameborder="0" 
                allowfullscreen
                style="margin-top: 1rem; border-radius: 8px;">
              </iframe>
            `;
          }
        });
    });
}

  fecharModal.addEventListener('click', function() {
    modal.classList.add('modal-fechado');
  });

  modal.addEventListener('click', function(e) {
    if (e.target === modal) { modal.classList.add('modal-fechado'); }
  });

  document.querySelectorAll('.btn-genero').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelector('.btn-genero.ativo').classList.remove('ativo');
      this.classList.add('ativo');
      generoAtual = this.dataset.id;
      paginaAtual = 1;
      buscarFilmes();
    });
  });
let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];

function favoritar(event, id, titulo, capa) {
  event.stopPropagation();
  
  const index = favoritos.findIndex(f => f.id === id);
  
  if (index === -1) {
    favoritos.push({ id, titulo, capa });
  } else {
    favoritos.splice(index, 1);
  }
  
  localStorage.setItem('favoritos', JSON.stringify(favoritos));
  buscarFilmes();
}

  buscarFilmes();
</script>

</body>
</html>
